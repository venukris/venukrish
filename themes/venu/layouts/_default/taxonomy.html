{{ define "main" }}
<div class="container">
  <div class="page-header">
    <h1>{{ .Title }}</h1>
  </div>
  <ul class="post-list">
    {{ range .Pages }}
    <li class="post-item">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <span class="post-date">{{ .Date.Format "Jan 2006" }}</span>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
